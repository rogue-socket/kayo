<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app">
      <header class="top">
        <div>
          <h1>Finance Manager</h1>
          <p>Track expenses, income, subscriptions, budgets, and PPF in one place</p>
        </div>
        <div class="actions">
          <button id="saveLocalBtn">Save Local</button>
          <button id="resetBtn" class="ghost">Reset to JSON</button>
        </div>
      </header>

      <section class="panel filter-panel">
        <div class="view-toggle" role="tablist" aria-label="Data view">
          <button class="tab active" data-view="expenses">Expenses</button>
          <button class="tab" data-view="income">Income</button>
        </div>

        <div class="period-grid">
          <div class="field">
            <label for="granularity">Time View</label>
            <select id="granularity">
              <option value="day">Day</option>
              <option value="week">Week</option>
              <option value="month">Month</option>
              <option value="year">Year</option>
            </select>
          </div>

          <div class="field" id="dayField">
            <label for="dayInput">Date</label>
            <input type="date" id="dayInput" />
          </div>

          <div class="field hidden" id="monthField">
            <label for="monthInput">Month</label>
            <input type="month" id="monthInput" />
          </div>

          <div class="field hidden" id="yearField">
            <label for="yearInput">Year</label>
            <input type="number" id="yearInput" min="2000" max="2100" />
          </div>
        </div>
      </section>

      <section class="stats">
        <article class="card">
          <h3>Total</h3>
          <p id="totalValue">INR 0</p>
        </article>
        <article class="card">
          <h3>Count</h3>
          <p id="countValue">0</p>
        </article>
        <article class="card">
          <h3>Average</h3>
          <p id="avgValue">INR 0</p>
        </article>
      </section>

      <section class="panel">
        <h2 id="tableTitle">Expenses</h2>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel split">
        <div>
          <h2>Add Records</h2>
          <div class="view-toggle secondary" role="tablist" aria-label="Add record type">
            <button class="tab active" data-add-view="expense">Expense</button>
            <button class="tab" data-add-view="income">Income</button>
            <button class="tab" data-add-view="subscription">Subscription</button>
          </div>

          <form id="expenseForm" class="entry-form add-form-panel">
            <div class="field">
              <label for="expenseDate">Date</label>
              <input type="date" id="expenseDate" required />
            </div>
            <div class="field">
              <label for="expenseCategory">Category</label>
              <input type="text" id="expenseCategory" list="expenseCategoryOptions" required placeholder="Food" />
              <datalist id="expenseCategoryOptions"></datalist>
            </div>
            <div class="field">
              <label for="expenseAmount">Amount</label>
              <input type="number" id="expenseAmount" min="0" step="0.01" required />
            </div>
            <div class="field">
              <label for="expensePaymentMethod">Payment Method</label>
              <input type="text" id="expensePaymentMethod" list="paymentMethodOptions" placeholder="UPI" />
              <datalist id="paymentMethodOptions"></datalist>
            </div>
            <div class="field">
              <label for="expenseNote">Note</label>
              <input type="text" id="expenseNote" placeholder="Optional" />
            </div>
            <button type="submit">Add Expense</button>
          </form>

          <form id="incomeForm" class="entry-form add-form-panel hidden">
            <div class="field">
              <label for="incomeDate">Date</label>
              <input type="date" id="incomeDate" required />
            </div>
            <div class="field">
              <label for="incomeSource">Source</label>
              <input type="text" id="incomeSource" list="incomeSourceOptions" required placeholder="Salary" />
              <datalist id="incomeSourceOptions"></datalist>
            </div>
            <div class="field">
              <label for="incomeAmount">Amount</label>
              <input type="number" id="incomeAmount" min="0" step="0.01" required />
            </div>
            <div class="field">
              <label for="incomeNote">Note</label>
              <input type="text" id="incomeNote" placeholder="Optional" />
            </div>
            <button type="submit">Add Income</button>
          </form>

          <form id="subscriptionForm" class="entry-form add-form-panel hidden">
            <div class="field">
              <label for="subName">Name</label>
              <input type="text" id="subName" required placeholder="Spotify" />
            </div>
            <div class="field">
              <label for="subAmount">Amount</label>
              <input type="number" id="subAmount" min="0" step="0.01" required />
            </div>
            <div class="field">
              <label for="subFrequency">Frequency</label>
              <select id="subFrequency">
                <option value="monthly">Monthly</option>
                <option value="yearly">Yearly</option>
              </select>
            </div>
            <div class="field">
              <label for="subStartDate">Start Date</label>
              <input type="date" id="subStartDate" required />
            </div>
            <div class="field">
              <label for="subRenewal">Renewal Month-Day</label>
              <input type="text" id="subRenewal" placeholder="06-10" pattern="[0-9]{2}-[0-9]{2}" />
            </div>
            <div class="field">
              <label for="subNote">Note</label>
              <input type="text" id="subNote" placeholder="Optional" />
            </div>
            <div class="form-actions">
              <button type="submit" id="subscriptionSubmitBtn">Add Subscription</button>
              <button type="button" id="subscriptionCancelBtn" class="ghost hidden">Cancel Edit</button>
            </div>
          </form>

          <h2 class="section-gap">Configuration</h2>
          <form id="settingsForm" class="entry-form">
            <div class="field">
              <label for="defaultCurrency">Default Currency</label>
              <input type="text" id="defaultCurrency" placeholder="INR" required />
            </div>
            <div class="field">
              <label for="configExpenseCategories">Expense Categories (comma separated)</label>
              <input type="text" id="configExpenseCategories" placeholder="Food, Transport, Utilities" />
            </div>
            <div class="field">
              <label for="configIncomeSources">Income Sources (comma separated)</label>
              <input type="text" id="configIncomeSources" placeholder="Salary, Freelance" />
            </div>
            <div class="field">
              <label for="configPaymentMethods">Payment Methods (comma separated)</label>
              <input type="text" id="configPaymentMethods" placeholder="UPI, Card, Cash" />
            </div>
            <button type="submit">Save Configuration</button>
          </form>
        </div>

        <div>
          <div class="view-toggle secondary" role="tablist" aria-label="Spending section view">
            <button class="tab active" data-section-view="expenses">Expenses</button>
            <button class="tab" data-section-view="subscriptions">Subscriptions</button>
          </div>

          <div id="expensesPanel" class="section-panel">
            <h2>Expenses Summary</h2>
            <div id="expenseSummary" class="stack"></div>
          </div>

          <div id="subscriptionsPanel" class="section-panel hidden">
            <h2>Subscriptions</h2>
            <div id="subscriptionsList" class="stack"></div>
          </div>

          <div id="ppfBox" class="ppf-box"></div>
        </div>
      </section>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
