<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Finance Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="bg-shape bg-shape-a"></div>
    <div class="bg-shape bg-shape-b"></div>

    <main class="app">
      <header class="top">
        <div>
          <h1>Finance Manager</h1>
          <p>Track expenses, income, subscriptions, budgets, and PPF in one place</p>
        </div>
        <div class="actions">
          <button id="saveLocalBtn">Save Local</button>
          <button id="resetBtn" class="ghost">Reset to JSON</button>
        </div>
      </header>

      <section class="panel filter-panel">
        <div class="view-toggle" role="tablist" aria-label="Data view">
          <button class="tab active" data-view="expenses">Expenses</button>
          <button class="tab" data-view="income">Income</button>
        </div>

        <div class="period-grid">
          <div class="field">
            <label for="granularity">Time View</label>
            <select id="granularity">
              <option value="day">Day</option>
              <option value="week">Week</option>
              <option value="month">Month</option>
              <option value="year">Year</option>
            </select>
          </div>

          <div class="field" id="dayField">
            <label for="dayInput">Date</label>
            <input type="date" id="dayInput" />
          </div>

          <div class="field hidden" id="monthField">
            <label for="monthInput">Month</label>
            <input type="month" id="monthInput" />
          </div>

          <div class="field hidden" id="yearField">
            <label for="yearInput">Year</label>
            <input type="number" id="yearInput" min="2000" max="2100" />
          </div>
        </div>
      </section>

      <section class="stats">
        <article class="card">
          <h3>Total</h3>
          <p id="totalValue">INR 0</p>
        </article>
        <article class="card">
          <h3>Count</h3>
          <p id="countValue">0</p>
        </article>
        <article class="card">
          <h3>Average</h3>
          <p id="avgValue">INR 0</p>
        </article>
      </section>

      <section class="panel">
        <h2 id="tableTitle">Expenses</h2>
        <div class="table-wrap">
          <table>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </section>

      <section class="panel split">
        <div>
          <h2>Quick Add</h2>
          <form id="entryForm" class="entry-form">
            <div class="field">
              <label for="entryType">Type</label>
              <select id="entryType">
                <option value="expense">Expense</option>
                <option value="income">Income</option>
              </select>
            </div>
            <div class="field">
              <label for="entryDate">Date</label>
              <input type="date" id="entryDate" required />
            </div>
            <div class="field">
              <label for="entryLabel">Category / Source</label>
              <input type="text" id="entryLabel" required placeholder="Food or Salary" />
            </div>
            <div class="field">
              <label for="entryAmount">Amount</label>
              <input type="number" id="entryAmount" min="0" step="0.01" required />
            </div>
            <div class="field">
              <label for="entryNote">Note</label>
              <input type="text" id="entryNote" placeholder="Optional" />
            </div>
            <button type="submit">Add Entry</button>
          </form>
        </div>

        <div>
          <h2>Subscriptions & PPF</h2>
          <div id="subscriptionsList" class="stack"></div>
          <div id="ppfBox" class="ppf-box"></div>
        </div>
      </section>
    </main>

    <script src="./dashboard.js"></script>
  </body>
</html>
